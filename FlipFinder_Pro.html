// Priority Scoring Engine
const calculatePriorityScore = (property) => {
  let score = 0;
  let factors = [];
  
  // Profit Potential (0-40 points)
  const maxOffer = (property.arv * 0.7) - 30000;
  const gap = maxOffer - property.listPrice;
  const gapPercent = (gap / property.arv) * 100;
  const roi = ((property.arv - property.listPrice - 30000) / (property.listPrice + 30000)) * 100;
  
  if (gapPercent >= 15) { score += 25; factors.push({ name: 'Excellent Price Gap', points: 25 }); }
  else if (gapPercent >= 10) { score += 20; factors.push({ name: 'Great Price Gap', points: 20 }); }
  else if (gapPercent >= 5) { score += 15; factors.push({ name: 'Good Price Gap', points: 15 }); }
  else if (gapPercent >= 0) { score += 10; factors.push({ name: 'At Max Offer', points: 10 }); }
  else if (gapPercent >= -10) { score += 5; factors.push({ name: 'Negotiable', points: 5 }); }
  
  if (roi >= 30) { score += 15; factors.push({ name: 'Excellent ROI (30%+)', points: 15 }); }
  else if (roi >= 20) { score += 12; factors.push({ name: 'Strong ROI (20%+)', points: 12 }); }
  else if (roi >= 15) { score += 8; factors.push({ name: 'Good ROI (15%+)', points: 8 }); }
  else if (roi >= 10) { score += 5; factors.push({ name: 'Acceptable ROI (10%+)', points: 5 }); }
  
  // Seller Motivation (0-35 points)
  const signals = property.distressSignals || [];
  if (signals.includes('Foreclosure')) { score += 15; factors.push({ name: 'Active Foreclosure', points: 15 }); }
  if (signals.includes('Pre-Foreclosure')) { score += 12; factors.push({ name: 'Pre-Foreclosure', points: 12 }); }
  if (signals.includes('Probate/Estate')) { score += 12; factors.push({ name: 'Inherited/Estate', points: 12 }); }
  if (signals.includes('Divorce')) { score += 10; factors.push({ name: 'Divorce', points: 10 }); }
  if (signals.includes('Tax Lien')) { score += 10; factors.push({ name: 'Tax Lien', points: 10 }); }
  if (signals.includes('Absentee Owner')) { score += 6; factors.push({ name: 'Absentee Owner', points: 6 }); }
  if (signals.includes('Vacant')) { score += 8; factors.push({ name: 'Vacant Property', points: 8 }); }
  if (property.ownershipYears >= 15) { score += 5; factors.push({ name: 'Long Ownership (15+ yrs)', points: 5 }); }
  if (property.equityPercent >= 70) { score += 6; factors.push({ name: 'High Equity (70%+)', points: 6 }); }
  if (signals.length >= 5) { score += 8; factors.push({ name: 'Multiple Signals Stacked', points: 8 }); }
  else if (signals.length >= 3) { score += 5; factors.push({ name: 'Multiple Signals', points: 5 }); }
  
  // Urgency/Timing (0-15 points)
  if (property.daysOnMarket >= 90) { score += 8; factors.push({ name: 'Stale Listing (90+ days)', points: 8 }); }
  else if (property.daysOnMarket >= 60) { score += 5; factors.push({ name: 'Getting Stale (60+ days)', points: 5 }); }
  if (property.priceReductions >= 2) { score += 8; factors.push({ name: 'Multiple Price Drops', points: 8 }); }
  else if (property.priceReductions >= 1) { score += 5; factors.push({ name: 'Price Reduced', points: 5 }); }
  
  // Contact Accessibility (0-10 points)
  if (property.owner?.phone) { score += 5; factors.push({ name: 'Phone Available', points: 5 }); }
  if (property.owner?.email) { score += 3; factors.push({ name: 'Email Available', points: 3 }); }
  
  return {
    score: Math.min(100, score),
    factors,
    tier: score >= 75 ? 'HOT' : score >= 55 ? 'WARM' : score >= 35 ? 'NURTURE' : 'MONITOR',
    maxOffer,
    roi: roi.toFixed(1),
    gapPercent: gapPercent.toFixed(1)
  };
};

// Dashboard Stats Component
const DashboardStats = ({ properties }) => {
  const stats = useMemo(() => {
    const hotLeads = properties.filter(p => calculatePriorityScore(p).tier === 'HOT').length;
    const warmLeads = properties.filter(p => calculatePriorityScore(p).tier === 'WARM').length;
    const totalValue = properties.reduce((sum, p) => sum + p.listPrice, 0);
    const avgROI = properties.reduce((sum, p) => sum + parseFloat(calculatePriorityScore(p).roi), 0) / properties.length;
    
    return { hotLeads, warmLeads, totalValue, avgROI };
  }, [properties]);
  
  return (
    <div className="stats-grid">
      <div className="stat-card">
        <div className="stat-icon">🔥</div>
        <div className="stat-value">{stats.hotLeads}</div>
        <div className="stat-label">Hot Leads</div>
        <div className="stat-change positive">↑ Ready to contact today</div>
      </div>
      <div className="stat-card">
        <div className="stat-icon">🌡️</div>
        <div className="stat-value">{stats.warmLeads}</div>
        <div className="stat-label">Warm Leads</div>
        <div className="stat-change">Contact this week</div>
      </div>
      <div className="stat-card">
        <div className="stat-icon">🏠</div>
        <div className="stat-value">{properties.length}</div>
        <div className="stat-label">Total Properties</div>
        <div className="stat-change positive">↑ 12% vs last week</div>
      </div>
      <div className="stat-card">
        <div className="stat-icon">💰</div>
        <div className="stat-value">${(stats.totalValue / 1000000).toFixed(1)}M</div>
        <div className="stat-label">Pipeline Value</div>
        <div className="stat-change positive">↑ 8% vs last month</div>
      </div>
      <div className="stat-card">
        <div className="stat-icon">📈</div>
        <div className="stat-value">{stats.avgROI.toFixed(1)}%</div>
        <div className="stat-label">Avg Potential ROI</div>
        <div className="stat-change positive">Strong opportunities</div>
      </div>
    </div>
  );
};

// MAIN APP
function FlipFinderPro() {
  const [activeTab, setActiveTab] = useState('dashboard');
  const [properties, setProperties] = useState([]);
  const [filteredProperties, setFilteredProperties] = useState([]);
  const [selectedProperty, setSelectedProperty] = useState(null);
  const [showNotifications, setShowNotifications] = useState(false);
  const [filters, setFilters] = useState({
    city: '', propertyType: '', minPrice: '', maxPrice: '',
    signals: [], minBeds: '', minEquity: '', priorityTier: '', daysOnMarket: ''
  });
  
  useEffect(() => {
    const mockProperties = generateMockProperties(50);
    setProperties(mockProperties);
    setFilteredProperties(mockProperties);
  }, []);
  
  const handleSearch = useCallback(() => {
    let result = [...properties];
    if (filters.city) result = result.filter(p => p.city === filters.city);
    if (filters.propertyType) result = result.filter(p => p.propertyType === filters.propertyType);
    if (filters.minPrice) result = result.filter(p => p.listPrice >= parseInt(filters.minPrice));
    if (filters.maxPrice) result = result.filter(p => p.listPrice <= parseInt(filters.maxPrice));
    if (filters.signals.length > 0) result = result.filter(p => filters.signals.some(s => p.distressSignals.includes(s)));
    if (filters.minBeds) result = result.filter(p => p.beds >= parseInt(filters.minBeds));
    if (filters.minEquity) result = result.filter(p => p.equityPercent >= parseInt(filters.minEquity));
    if (filters.priorityTier) result = result.filter(p => calculatePriorityScore(p).tier === filters.priorityTier);
    if (filters.daysOnMarket) result = result.filter(p => p.daysOnMarket >= parseInt(filters.daysOnMarket));
    result.sort((a, b) => calculatePriorityScore(b).score - calculatePriorityScore(a).score);
    setFilteredProperties(result);
  }, [properties, filters]);
  
  const handleClearFilters = () => {
    setFilters({ city: '', propertyType: '', minPrice: '', maxPrice: '', signals: [], minBeds: '', minEquity: '', priorityTier: '', daysOnMarket: '' });
    setFilteredProperties(properties);
  };
  
  const renderContent = () => {
    switch (activeTab) {
      case 'dashboard':
        return (
          <div>
            <DashboardStats properties={properties} />
            <div className="card">
              <div className="card-header">
                <span className="card-title">🔥 Hot Leads - Contact Today</span>
              </div>
              <div className="card-body">
                <div className="property-grid">
                  {filteredProperties.filter(p => calculatePriorityScore(p).tier === 'HOT').slice(0, 6).map(property => (
                    <PropertyCard key={property.id} property={property} onClick={setSelectedProperty} />
                  ))}
                </div>
              </div>
            </div>
          </div>
        );
      case 'search':
        return (
          <div>
            <PropertySearch filters={filters} setFilters={setFilters} onSearch={handleSearch} onClear={handleClearFilters} />
            <div className="flex justify-between items-center mb-3">
              <span style={{ color: 'var(--text-secondary)' }}>Showing {filteredProperties.length} properties</span>
            </div>
            <div className="property-grid">
              {filteredProperties.map(property => (
                <PropertyCard key={property.id} property={property} onClick={setSelectedProperty} />
              ))}
            </div>
          </div>
        );
      case 'pipeline':
        return (
          <div>
            <h2 style={{ fontSize: '1.25rem', fontWeight: 600, marginBottom: '1rem' }}>Deal Pipeline</h2>
            <PipelineKanban properties={properties} onPropertyClick={setSelectedProperty} />
          </div>
        );
      case 'priority':
        return (
          <div>
            <h2 style={{ fontSize: '1.25rem', fontWeight: 600, marginBottom: '1rem' }}>Contact Priority Queue</h2>
            <div className="property-grid">
              {[...filteredProperties].sort((a, b) => calculatePriorityScore(b).score - calculatePriorityScore(a).score).map(property => (
                <PropertyCard key={property.id} property={property} onClick={setSelectedProperty} />
              ))}
            </div>
          </div>
        );
      case 'team': return <TeamManagement />;
      case 'templates': return <OutreachTemplates />;
      case 'reports': return <ReportsAnalytics />;
      case 'settings': return <SettingsPanel />;
      default: return null;
    }
  };
  
  return (
    <div className="app-container">
      <header className="header">
        <div className="logo">
          <div className="logo-icon">FF</div>
          <span className="logo-text">FlipFinder Pro</span>
        </div>
        <div className="header-actions">
          <button className="notification-btn" onClick={() => setShowNotifications(!showNotifications)}>
            🔔<span className="notification-badge">3</span>
          </button>
          <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', paddingLeft: '1rem', borderLeft: '1px solid var(--border-color)' }}>
            <span style={{ fontSize: '1.5rem' }}>👤</span>
            <span style={{ fontSize: '0.875rem' }}>Investor</span>
          </div>
        </div>
      </header>
      
      <nav className="nav-tabs">
        {[
          { id: 'dashboard', label: '📊 Dashboard' },
          { id: 'search', label: '🔍 Property Search' },
          { id: 'pipeline', label: '📋 Pipeline' },
          { id: 'priority', label: '🎯 Priority Queue' },
          { id: 'team', label: '👥 Team' },
          { id: 'templates', label: '📝 Templates' },
          { id: 'reports', label: '📈 Reports' },
          { id: 'settings', label: '⚙️ Settings' }
        ].map(tab => (
          <button key={tab.id} className={`nav-tab ${activeTab === tab.id ? 'active' : ''}`} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </nav>
      
      <main className="main-content">{renderContent()}</main>
      
      <NotificationsPanel show={showNotifications} onClose={() => setShowNotifications(false)} />
      
      {selectedProperty && (
        <PropertyDetailModal 
          property={selectedProperty}
          onClose={() => setSelectedProperty(null)}
          onUpdate={(p) => { setProperties(properties.map(pr => pr.id === p.id ? p : pr)); setSelectedProperty(p); }}
        />
      )}
    </div>
  );
}

.property-location { font-size: 0.8125rem; color: var(--text-secondary); margin-bottom: 0.75rem; }
.property-specs { display: flex; gap: 1rem; margin-bottom: 0.75rem; font-size: 0.8125rem; color: var(--text-secondary); }
.property-spec { display: flex; align-items: center; gap: 0.25rem; }

.property-pricing {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
  padding-top: 0.75rem;
  border-top: 1px solid var(--border-color);
}

.price-item { text-align: center; }
.price-label { font-size: 0.6875rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.price-value { font-size: 1rem; font-weight: 600; color: var(--text-primary); }
.price-value.success { color: var(--success); }
.price-value.danger { color: var(--danger); }

.search-panel {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 1.25rem;
  margin-bottom: 1.5rem;
}

.search-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1rem; }

.search-actions {
  display: flex;
  gap: 0.75rem;
  justify-content: flex-end;
  padding-top: 1rem;
  border-top: 1px solid var(--border-color);
}

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 1.25rem;
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--gradient-1);
}

.stat-icon { font-size: 2rem; margin-bottom: 0.75rem; }
.stat-value { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.25rem; }
.stat-label { font-size: 0.8125rem; color: var(--text-secondary); }
.stat-change { font-size: 0.75rem; margin-top: 0.5rem; }
.stat-change.positive { color: var(--success); }

.pipeline-container { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 1rem; }

.pipeline-column {
  min-width: 280px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  flex-shrink: 0;
}

.pipeline-header {
  padding: 1rem;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.pipeline-title { display: flex; align-items: center; gap: 0.5rem; }
.pipeline-dot { width: 10px; height: 10px; border-radius: 50%; }
.pipeline-count { background: var(--bg-tertiary); padding: 0.125rem 0.5rem; border-radius: 10px; font-size: 0.75rem; color: var(--text-secondary); }
.pipeline-cards { padding: 0.75rem; display: flex; flex-direction: column; gap: 0.75rem; max-height: 500px; overflow-y: auto; }

.pipeline-card {
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 0.875rem;
  cursor: pointer;
  transition: all 0.2s;
}

.pipeline-card:hover { border-color: var(--accent-primary); transform: translateY(-2px); }
.pipeline-card-address { font-size: 0.875rem; font-weight: 600; margin-bottom: 0.25rem; }
.pipeline-card-city { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
.pipeline-card-price { font-size: 0.875rem; font-weight: 600; color: var(--success); }

.pipeline-card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 0.5rem;
  padding-top: 0.5rem;
  border-top: 1px solid var(--border-color);
  font-size: 0.75rem;
  color: var(--text-muted);
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 2rem;
}

.modal-content {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  width: 100%;
  max-width: 900px;
  max-height: 90vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.modal-header {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-close {
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-size: 1.5rem;
  cursor: pointer;
  padding: 0.5rem;
  border-radius: 8px;
  transition: all 0.2s;
}

.modal-close:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.modal-body { flex: 1; overflow-y: auto; padding: 1.5rem; }

.detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }

.detail-section {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 1.25rem;
}

.detail-section-title {
  font-size: 0.875rem;
  font-weight: 600;
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.detail-row {
  display: flex;
  justify-content: space-between;
  padding: 0.5rem 0;
  font-size: 0.8125rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.detail-row:last-child { border-bottom: none; }
.detail-label { color: var(--text-secondary); }
.detail-value { font-weight: 500; text-align: right; }

.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }

.team-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 1.5rem;
  text-align: center;
  transition: all 0.2s;
}

.team-card:hover { border-color: var(--accent-primary); transform: translateY(-2px); }
.team-avatar { font-size: 3rem; margin-bottom: 1rem; }
.team-name { font-size: 1.125rem; font-weight: 600; margin-bottom: 0.25rem; }
.team-role { font-size: 0.8125rem; color: var(--text-secondary); margin-bottom: 1rem; }

.team-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border-color);
}

.team-stat-value { font-size: 1.25rem; font-weight: 700; }
.team-stat-label { font-size: 0.6875rem; color: var(--text-muted); text-transform: uppercase; }

.templates-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }

.template-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 1.25rem;
  cursor: pointer;
  transition: all 0.2s;
}

.template-card:hover { border-color: var(--accent-primary); transform: translateY(-2px); }
.template-category { font-size: 0.6875rem; text-transform: uppercase; color: var(--accent-primary); letter-spacing: 0.5px; margin-bottom: 0.5rem; }
.template-name { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
.template-preview { font-size: 0.8125rem; color: var(--text-secondary); }

.reports-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.25rem; }

.report-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 1.5rem;
  transition: all 0.2s;
  cursor: pointer;
}

.report-card:hover { border-color: var(--accent-primary); box-shadow: var(--shadow-md); }
.report-icon { font-size: 2rem; margin-bottom: 1rem; }
.report-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
.report-description { font-size: 0.8125rem; color: var(--text-secondary); }

.settings-section {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}

.settings-title {
  font-size: 1.125rem;
  font-weight: 600;
  margin-bottom: 1rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border-color);
}

.notifications-panel {
  position: fixed;
  top: 60px;
  right: 1rem;
  width: 380px;
  max-height: 500px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  z-index: 200;
  overflow: hidden;
}

.notifications-header {
  padding: 1rem;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.notifications-list { max-height: 400px; overflow-y: auto; }

.notification-item {
  padding: 1rem;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  gap: 0.75rem;
  cursor: pointer;
  transition: all 0.2s;
}

.notification-item:hover { background: var(--bg-tertiary); }
.notification-item.unread { background: rgba(99, 102, 241, 0.05); }

.notification-icon {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.25rem;
  flex-shrink: 0;
}

.notification-icon.hot { background: rgba(239, 68, 68, 0.15); }
.notification-icon.price { background: rgba(16, 185, 129, 0.15); }
.notification-icon.followup { background: rgba(245, 158, 11, 0.15); }
.notification-icon.match { background: rgba(99, 102, 241, 0.15); }

.notification-content { flex: 1; min-width: 0; }
.notification-title { font-size: 0.875rem; font-weight: 600; margin-bottom: 0.25rem; }
.notification-message { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
.notification-time { font-size: 0.6875rem; color: var(--text-muted); }

.text-success { color: var(--success) !important; }
.text-danger { color: var(--danger) !important; }
.text-warning { color: var(--warning) !important; }
.text-muted { color: var(--text-muted) !important; }

.mt-1 { margin-top: 0.5rem; }
.mt-2 { margin-top: 1rem; }
.mt-3 { margin-top: 1.5rem; }
.mb-1 { margin-bottom: 0.5rem; }
.mb-2 { margin-bottom: 1rem; }
.mb-3 { margin-bottom: 1.5rem; }

.flex { display: flex; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-1 { gap: 0.5rem; }
.gap-2 { gap: 1rem; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-fade-in { animation: fadeIn 0.3s ease-out; }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
